apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
availabilityZones:
  - ap-south-1a
  - ap-south-1b
metadata:
  name: petclinic
  region: ap-south-1
  version: "1.35"
  tags:
    created-by: ayush
    env: petclinic
autoModeConfig:
  enabled: false
iam:
  withOIDC: true
addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
managedNodeGroups:
  - name: petclinic-ng
    desiredCapacity: 3
    minSize: 2
    maxSize: 4
    instanceType: t3.medium
    volumeSize: 20
    privateNetworking: true
    updateConfig:
      maxUnavailablePercentage: 50
    labels:
      role: worker
    tags:
      nodegroup-role: worker
    iam:
      withAddonPolicies:
        imageBuilder: false
        autoScaler: true
        externalDNS: true
        certManager: true
        appMesh: false
        appMeshPreview: false
        ebs: true
        fsx: false
        efs: false
        awsLoadBalancerController: true
        xRay: false
        cloudWatch: false
