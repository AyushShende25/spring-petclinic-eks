apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic-app
  namespace: pet-clinic-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: "ScheduleAnyway"
          labelSelector:
            matchLabels:
              app: petclinic
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: "ScheduleAnyway"
          labelSelector:
            matchLabels:
              app: petclinic
      serviceAccountName: dockerhub-sa
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: petclinic
          image: ayushshende9/pet-clinic:2.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: petclinic-config
            - secretRef:
                name: petclinic-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
